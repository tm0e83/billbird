<div id="login" [class.error]="error === true">
    <h2>Login</h2>
    <div class="row">
        <label for="email" class="col">E-Mail</label>
        <input [(ngModel)]="email" type="email" id="email" (input)="onInput()" (keydown)="onKeyDown($event)" class="col">
    </div>
    <div class="row">
        <label for="password" class="col">Password</label>
        <input [(ngModel)]="password" type="password" id="password" (input)="onInput()" (keydown)="onKeyDown($event)" class="col">
    </div>
    <div class="row">
        <button (click)="login()" class="col">Login</button>
    </div>
</div>
