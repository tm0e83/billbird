<main-menu></main-menu>
<div *ngIf="datasets">
  <div *ngIf="!selectedDataset">
    <dataset-list
      *ngIf="!selectedDataset"
      (datasetSelectedEvent)="gotoDetail($event)"
      (updateSumEvent)="updateSum($event)">
    </dataset-list>
  </div>
  <div *ngIf="selectedDataset">
    <dataset-details
      *ngIf="selectedDataset"
      [dataset]="selectedDataset"
      (closeDetailView)="showList($event)">
    </dataset-details>
  </div>
</div>
<simple-notifications [options]="simpleNotificationsOptions"></simple-notifications>
