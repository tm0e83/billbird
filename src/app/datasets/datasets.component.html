<main-menu></main-menu>
<div *ngIf="datagroups">
    <div *ngIf="!selectedDataset">
        <dataset-list *ngIf="!selectedDataset"
            [datagroups]="datagroups"
            (datasetSelected)="gotoDetail($event)"></dataset-list>
    </div>
    <div *ngIf="selectedDataset">
        <dataset-details *ngIf="selectedDataset"
            [dataset]="selectedDataset"
            (closeDetailView)="showList($event)"></dataset-details>
    </div>
</div>
<button (click)="saveAllData()">Save all</button>
