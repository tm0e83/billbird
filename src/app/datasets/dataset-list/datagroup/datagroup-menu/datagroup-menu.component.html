<div class="datagroup-menu text-left"
  [class.open]="isExpanded === true"
  (clickOutside)="closeMenu()">
  <i class="fa fa-ellipsis-v datagroup-menu-icon"
    aria-hidden="true"
    (click)="toggleMenu()"></i>
  <ul>
    <li>
      <a (click)="alterGroup('DELETE_DATAGROUP')">Delete Datagroup</a>
    </li>
    <li>
      <a (click)="createDataset()">New Dataset</a>
    </li>
    <li *ngIf="selectedDataset">
      <a (click)="alterGroup('DELETE_DATASET')">Delete Dataset</a>
    </li>
  </ul>
</div>
