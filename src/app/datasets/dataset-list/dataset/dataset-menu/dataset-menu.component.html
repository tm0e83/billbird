<div class="datagroup-menu text-left"
  [class.open]="isExpanded === true"
  (clickOutside)="closeMenu()">
  <i class="fa fa-ellipsis-v datagroup-menu-icon"
  aria-hidden="true"
  (click)="toggleMenu()"></i>
  <ul>
    <li *ngFor="let option of options">
      <button (click)="option.fn()" [disabled]="option.disabled">{{option.text}}</button>
    </li>
  </ul>
</div>
