<div class="datagroup-list-container">
  <div class="datagroup-list-head container">
    <div class="row button-row">
      <div class="col col-icon"></div>
      <div class="col">
        <h3>Overview</h3>
      </div>
      <div class="col text-right">
        <button class="button" (click)="addNewDatagroup()">New Datagroup</button>
        <button class="button" (click)="prefillUpdateValues()">Prefill Update Values</button>
        <button class="button" (click)="applyUpdateValues()">Apply Update Values</button>
      </div>
    </div>
    <div class="row group-list-head">
      <div class="col col-icon"></div>
      <div class="col col-search">
        <input type="text" placeholder="Title"
          [(ngModel)]="search"
          (input)="onChangeFilterTitle()">
      </div>
      <div class="col col-val">Zyklus</div>
      <div class="col col-val text-right"><b>RE</b></div>
      <div class="col col-val text-right"><b>Mtl</b></div>
      <div class="col col-val text-right">+ / -</div>
      <div class="col col-bttn-small"></div>
      <div class="col col-val text-right"><b>Ist</b></div>
      <div class="col col-val text-right"><b>Soll</b></div>
      <div class="col col-val text-right"><b>Diff</b></div>
    </div>
    <div class="row group-list-sum">
      <div class="col col-icon"></div>
      <div class="col"></div>
      <div class="col col-val">
        <input type="text" value="{{billingValueSum | currency:'EUR'}}">
      </div>
      <div class="col col-val">
        <input type="text" value="{{monthlyShareSum | currency:'EUR'}}">
      </div>
      <div class="col col-val">
        <input type="text" value="{{updateValueSum | currency:'EUR'}}">
      </div>
      <div class="col col-bttn-small"></div>
      <div class="col col-val">
        <input type="text" value="{{currentValueSum | currency:'EUR'}}">
      </div>
      <div class="col col-val">
        <input type="text" value="{{targetValueSum | currency:'EUR'}}">
      </div>
      <div class="col col-val">
        <input type="text" value="{{diffValueSum | currency:'EUR'}}">
      </div>
    </div>
  </div>
  <div class="datagroup-list container">
    <div *ngFor="let datagroup of datagroups"
      class="datagroup"
      [class.selected]="datagroup === selectedDatagroup">
      <datagroup
        (click)="onSelectDatagroup(datagroup)"
        [datagroup]="datagroup"
        [datagroups]="datagroups"
        (updateSumEvent)="updateSum($event)"
        (datasetSelectedEvent)="gotoDetail($event)">
      </datagroup>
    </div>
  </div>
  <create-datagroup-modal [addDatasetModalVisible]="addDatasetModalVisible"></create-datagroup-modal>
  <create-dataset-modal [addDatasetModalVisible]="addDatasetModalVisible"></create-dataset-modal>
</div>
