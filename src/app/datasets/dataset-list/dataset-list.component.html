<div class="container content-head">
  <div class="row button-row collapse">
    <div class="col">
      <h3 class="normal no-margin">Overview</h3>
    </div>
    <div class="col text-right">
      <button class="button"
        title="Create Dataset"
        (click)="createDataset()">+</button>
      <button class="button" (click)="prefillUpdateValues()">Prefill Update Values</button>
      <button class="button" (click)="applyUpdateValues()">Apply Update Values</button>
      <button class="button" (click)="save()">Save</button>
    </div>
  </div>
</div>
<div class="card container no-padding">
  <div class="datasets-list-head">
    <div class="row group-list-head align-top">
      <div class="col col-icon"></div>
      <div class="col col-search">
        <input type="text" placeholder="Search title..."
          [(ngModel)]="search"
          (input)="onChangeFilterTitle()">
      </div>
      <div class="col col-val text-right"><span>DOI</span></div>
      <div class="col col-val"><span>Cycle</span></div>
      <div class="col col-val text-right">
        <span>Bill</span><br>
        {{billingValueSum | currency:'EUR'}}
      </div>
      <div class="col col-val text-right">
        <span>Monthly</span><br>
        {{monthlyShareSum | currency:'EUR'}}
      </div>
      <div class="col col-val text-right">
        <span>+ / -</span><br>
        {{updateValueSum | currency:'EUR'}}
      </div>
      <div class="col col-bttn-small"></div>
      <div class="col col-val text-right">
        <span>Current</span><br>
        {{currentValueSum | currency:'EUR'}}
      </div>
      <div class="col col-val text-right">
        <span>Target</span><br>
        {{targetValueSum | currency:'EUR'}}
      </div>
      <div class="col col-val text-right">
        <span>Diff</span><br>
        {{diffValueSum | currency:'EUR'}}
      </div>
    </div>
  </div>
  <div class="datasets-list">
    <div class="datagroup">
      <div class="setsContainer"
        [dragula]="bag-one"
        [dragulaModel]="datasets">
        <dataset
          *ngFor="let dataset of datasets"
          (click)="onSelectDataset(dataset)"
          [class.selected]="dataset === selectedDataset"
          [filterTitle]="filterTitle"
          [dataset]="dataset"
          (updateSumEvent)="updateSum($event)"
          (datasetSelectedEvent)="gotoDetail(dataset)">
        </dataset>
      </div>
    </div>
  </div>
</div>
<create-dataset-modal></create-dataset-modal>
