  </div>

<div class="container" *ngIf="dataset">
  <div class="row">
    <div class="col">created on {{ dataset.creationDate | unixDateToString }}, last modified on {{ dataset.lastModifiedDate | unixDateToString }}</div>
  </div>
</div>
<div class="row collapse align-top">

  <div class="col">
    <div class="row">
      <div class="col">
        <label for="">ID</label>
        <input [(ngModel)]="dataset.id" placeholder="ID">
      </div>
      <div class="col">
        <label for="">Title</label>
        <input [(ngModel)]="dataset.title" placeholder="Title">
      </div>
    </div>
    <div class="row">
      <div class="col">
        <label for="">Description</label>
        <textarea [(ngModel)]="dataset.description" placeholder="Description"></textarea>
      </div>
    </div>
  </div>
  <div class="col">
    <div class="row">
      <div class="col">
        <label for="">Charge date</label>
        <input [(ngModel)]="dataset.chargeDate" type="date">
      </div>
      <div class="col">
        <label for="">Billing cycle</label>
        <input [(ngModel)]="dataset.billingCycle" placeholder="Billing cycle">
      </div>
    </div>
    <div class="row">
      <div class="col">
        <label for="">Current value</label>
        <input [(ngModel)]="dataset.currentValue" placeholder="Current value" type="number" step="0.01">
      </div>
      <div class="col">
        <label for="">Target value</label>
        <input [(ngModel)]="dataset.targetValue" placeholder="Target value" type="number" step="0.01">
      </div>
      <div class="col">
        <label for="">Difference</label>
        <input [(ngModel)]="dataset.diffValue" placeholder="Difference" type="number" step="0.01">
      </div>
    </div>
  </div>
</div>
<div class="row">
  <div class="col shrink"><button class="button" (click)="goToList()">back&nbsp;to&nbsp;list</button></div>
  <div class="col"><button class="button" (click)="save()">Save</button></div>
</div>
